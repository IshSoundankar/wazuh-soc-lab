<!-- Wazuh Windows Agent Configuration -->
<!-- Place at: C:\Program Files (x86)\ossec-agent\ossec.conf on Windows Agent VM -->

<ossec_config>

  <client>
    <server>
      <address>10.0.2.5</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- File Integrity Monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor test directory for VirusTotal lab -->
    <directories realtime="yes" check_all="yes">C:\Users\imish\Desktop\test</directories>

    <!-- Default Windows monitored directories -->
    <directories recursion_level="0" restrict="regedit.exe$|system.ini$|win.ini$">%WINDIR%</directories>
    <directories>%WINDIR%\SysNative\drivers\etc</directories>
    <directories>%WINDIR%\System32\drivers\etc</directories>

    <ignore>%PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\Startup</ignore>
  </syscheck>

  <!-- Windows Event Log -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
    <query>Event/System[EventID != 5145 and EventID != 5156 and EventID != 5447]</query>
  </localfile>

  <localfile>
    <log_format>eventchannel</log_format>
    <location>System</location>
    <query>Event/System[EventID != 5145]</query>
  </localfile>

  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
  </localfile>

</ossec_config>
